spring.application.name=ai-task-orchestrator

spring.datasource.url=jdbc:mysql://localhost:3306/ai_task_orchestrator_flyway?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

server.port=8080

app.embedding.provider=mock
app.embedding.openai.base-url=https://api.openai.com/v1
app.embedding.openai.api-key=${OPENAI_API_KEY:}
app.embedding.openai.model=text-embedding-3-small
app.embedding.openai.timeout-ms=10000
app.embedding.openai.dimension=1536
